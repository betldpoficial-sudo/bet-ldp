<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bet LDP — Inicia Sesión</title>
  <link rel="icon" type="image/png" href="./assets/logo3.png">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./styles/global.css">
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<div class="particles" id="particles"></div>

<nav id="navbar">
  <div id="navbar-left">
    <button id="logo-btn" onclick="goHome()">
      <img src="./assets/logo1.png" alt="Bet LDP Logo" style="height:32px; width:auto; margin-right:8px;">
    </button>
  </div>
</nav>

<div id="app">
  <section class="tab-section" id="tab-recuperacion">
    <h2 class="section-title">Restablecer Contraseña</h2>
    <div class="card">
      <label for="rec-nombre">Nombre de Usuario</label>
      <input type="text" id="rec-nombre" placeholder="Tu nombre">
      
      <label for="rec-email">Correo Electrónico</label>
      <input type="email" id="rec-email" placeholder="tu@email.com">
      
      <button id="btn-send-code" class="btn-primary" onclick="enviarCodigo()">Enviar Código</button>
      <div class="alert" id="rec-msg1" style="display:none;"></div>
      
      <div id="rec-step2" style="display:none; margin-top:20px;">
        <h3>Verifica tu código</h3>
        <div style="display:flex; gap:8px; justify-content:center; margin:15px 0;">
          <input type="text" class="code-char" data-idx="0" maxlength="1" inputmode="numeric" onkeydown="onCodeKeydown(event, this)" oninput="onCodeInput(this)">
          <input type="text" class="code-char" data-idx="1" maxlength="1" inputmode="numeric" onkeydown="onCodeKeydown(event, this)" oninput="onCodeInput(this)">
          <input type="text" class="code-char" data-idx="2" maxlength="1" inputmode="numeric" onkeydown="onCodeKeydown(event, this)" oninput="onCodeInput(this)">
          <input type="text" class="code-char" data-idx="3" maxlength="1" inputmode="numeric" onkeydown="onCodeKeydown(event, this)" oninput="onCodeInput(this)">
          <input type="text" class="code-char" data-idx="4" maxlength="1" inputmode="numeric" onkeydown="onCodeKeydown(event, this)" oninput="onCodeInput(this)">
          <input type="text" class="code-char" data-idx="5" maxlength="1" inputmode="numeric" onkeydown="onCodeKeydown(event, this)" oninput="onCodeInput(this)">
        </div>
        <button class="btn-primary" onclick="verificarCodigo()">Verificar Código</button>
        <div class="alert" id="rec-msg2" style="display:none;"></div>
      </div>
    </div>
  </section>
  
  <section class="tab-section" id="tab-new-pass">
    <h2 class="section-title">Nueva Contraseña</h2>
    <div class="card">
      <label for="new-pass-1">Nueva Contraseña</label>
      <input type="password" id="new-pass-1" placeholder="••••••">
      
      <label for="new-pass-2">Confirmar Contraseña</label>
      <input type="password" id="new-pass-2" placeholder="••••••">
      
      <button class="btn-primary" onclick="actualizarContra()">Cambiar Contraseña</button>
      <div class="alert" id="new-pass-msg" style="display:none;"></div>
    </div>
  </section>
</div>

<footer class="game-footer">
  <div class="footer-content">
    <div class="footer-section">
      <h3>Bet LDP</h3>
      <p>Tu casino de confianza</p>
    </div>
    <div class="footer-section">
      <p>&copy; 2026 BetLDP. Todos los derechos reservados.</p>
    </div>
  </div>
</footer>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC8jSaP8e1UvLDn2sDdIyo2Z9o_KNhSEro",
    authDomain: "tuesa-oficial.firebaseapp.com",
    projectId: "tuesa-oficial",
    storageBucket: "tuesa-oficial.firebasestorage.app",
    messagingSenderId: "447951557213",
    appId: "1:447951557213:web:293e062ae3fe474c1cb3b4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let codigoEnviado = '';
  let emailRecuperacion = '';

  function showMsg(containerId, type, text) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.className = 'alert ' + type;
    el.textContent = text;
    el.style.display = 'block';
  }

  function clearMsg(containerId) {
    const el = document.getElementById(containerId);
    if (el) { el.style.display = 'none'; el.textContent = ''; el.className = 'alert'; }
  }

  function showTab(name) {
    document.querySelectorAll('.tab-section').forEach(s => {
      s.classList.remove('active');
      s.style.display = 'none';
    });
    
    const el = document.getElementById('tab-' + name);
    if (el) {
      el.classList.add('active');
      el.style.display = 'block';
    }
  }

  function goHome() {
    window.location.href = './index.html';
  }

  async function enviarCodigo() {
    const nombre = document.getElementById('rec-nombre').value.trim();
    const email  = document.getElementById('rec-email').value.trim();
    clearMsg('rec-msg1');

    if (!nombre || !email) { showMsg('rec-msg1', 'error', 'Completá nombre y correo.'); return; }

    const btn = document.getElementById('btn-send-code');
    btn.innerHTML = '<span class="spinner"></span>Enviando...';
    btn.disabled = true;

    try {
      const snap = await db.collection('cuentas').where('correo', '==', email).get();
      if (snap.empty) {
        showMsg('rec-msg1', 'error', 'Este correo no está registrado.');
        btn.innerHTML = 'Enviar Código';
        btn.disabled = false;
        return;
      }

      codigoEnviado      = Math.floor(100000 + Math.random() * 900000).toString();
      emailRecuperacion  = email;

      try {
        await emailjs.send('service_jwbttvy', 'template_meurz27', {
          email: email,
          codigo: codigoEnviado,
          nombre: nombre
        });
      } catch(e) {
        console.error('Error enviando email:', e);
      }

      showMsg('rec-msg1', 'success', `Código enviado a ${email}`);
      document.getElementById('rec-step2').style.display = 'block';
      btn.innerHTML = 'Enviar Código';
      btn.disabled = false;
    } catch(e) {
      showMsg('rec-msg1', 'error', 'Error al enviar código. Intentá nuevamente.');
      console.error(e);
      btn.innerHTML = 'Enviar Código';
      btn.disabled = false;
    }
  }

  function verificarCodigo() {
    const chars  = document.querySelectorAll('.code-char');
    const ingresado = Array.from(chars).map(c => c.value).join('');
    clearMsg('rec-msg2');

    if (ingresado.length < 6) { showMsg('rec-msg2', 'error', 'Ingresá el código completo de 6 dígitos.'); return; }

    if (ingresado === codigoEnviado) {
      showMsg('rec-msg2', 'success', '¡Código correcto!');
      setTimeout(() => showTab('new-pass'), 900);
    } else {
      showMsg('rec-msg2', 'error', 'Código incorrecto. Intentá nuevamente.');
    } 
  }

  function onCodeInput(el) {
    if (el.value.length === 1) {
      const next = document.querySelector(`.code-char[data-idx="${parseInt(el.dataset.idx)+1}"]`);
      if (next) next.focus();
    }
  }

  function onCodeKeydown(e, el) {
    if (e.key === 'Backspace' && el.value === '') {
      const prev = document.querySelector(`.code-char[data-idx="${parseInt(el.dataset.idx)-1}"]`);
      if (prev) { prev.value = ''; prev.focus(); }
    }
  }

  async function autoLogin() {
    const savedUserId = localStorage.getItem('betldp_user_id');
    const savedEmail = localStorage.getItem('betldp_user_email');
    
    if (!savedUserId || !savedEmail) {
      window.location.href = './index.html';
      return false;
    }
    
    try {
      const doc = await db.collection('cuentas').doc(savedUserId).get();
      if (doc.exists) {
        const data = doc.data();
        if (data.correo === savedEmail) {
          currentUser = { docId: doc.id, ...data };
          return true;
        }
      }
    } catch(e) {
      console.warn('AutoLogin error:', e);
    }
    
    window.location.href = './index.html';
    return false;
  }

  async function actualizarContra() {
    const p1 = document.getElementById('new-pass-1').value;
    const p2 = document.getElementById('new-pass-2').value;
    clearMsg('new-pass-msg');

    if (!p1 || !p2)    { showMsg('new-pass-msg', 'error', 'Completá ambos campos.'); return; }
    if (p1 !== p2)     { showMsg('new-pass-msg', 'error', 'Las contraseñas no coinciden.'); return; }
    if (p1.length < 6) { showMsg('new-pass-msg', 'error', 'La contraseña debe tener al menos 6 caracteres.'); return; }
    if (!emailRecuperacion) { showMsg('new-pass-msg', 'error', 'Sesión expirada. Volvé al login.'); return; }

    try {
      const snap = await db.collection('cuentas').where('correo', '==', emailRecuperacion).get();
      if (!snap.empty) {
        await db.collection('cuentas').doc(snap.docs[0].id).update({ clave: p1 });
        showMsg('new-pass-msg', 'success', 'Contraseña actualizada. Redirigiendo al login...');
        codigoEnviado = '';
        emailRecuperacion = '';
        setTimeout(() => showTab('login'), 1500);
      }
    } catch(e) {
      showMsg('new-pass-msg', 'error', 'Error al actualizar contraseña. Intentá nuevamente.');
      console.error(e);
    }
  }

  (function(){ emailjs.init({ publicKey: "TSm2szahK3vNCAvH7" }); })();

  (function generateParticles() {
    const container = document.getElementById('particles');
    if (!container) return;
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.setProperty('--dur',   (7 + Math.random() * 8) + 's');
      p.style.setProperty('--delay', (Math.random() * 10)    + 's');
      p.style.setProperty('--drift', ((Math.random() - 0.5) * 60) + 'px');
      p.style.left = (Math.random() * 100) + '%';
      p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
      container.appendChild(p);
    }
  })();

  document.addEventListener('DOMContentLoaded', function() {
    showTab('recuperacion');
  });
</script>
</body>
</html>
