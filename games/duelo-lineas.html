<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Duelo de Líneas — Bet LDP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../logo3.png">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/duelo-lineas.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
<nav id="navbar">
  <div id="navbar-left">
    <button id="logo-btn" onclick="window.location.href='../app.html'">
      <img src="../logo1.png" alt="BetLDP Logo">
    </button>
  </div>
  <div id="navbar-right">
    <span id="money-display">$0.00</span>
  </div>
</nav>
<div class="game-master">
  <div class="game-container">
    <h1>⚔️ DUELO DE LÍNEAS ⚔️</h1>

    <div id="duelo-selection" class="card">
      <div style="font-size:26px; font-weight:bold; color:#f5cd7a; text-align:center; margin-bottom:16px;" id="saldo-display">$0.00</div>
      <label>🎯 Dificultad</label>
      <select id="duelo-diff">
        <option value="easy">🟢 Fácil (15 vidas, 7x7) - 7.5%</option>
        <option value="normal">🟡 Medio (10 vidas, 7x7) - 15%</option>
        <option value="hard">🔴 Difícil (10 vidas, 10x10) - 22.5%</option>
      </select>
      <label>💰 Tu apuesta ($)</label>
      <input type="number" id="duelo-bet" placeholder="Ej: 50" min="1" step="1">
      <button class="btn-primary" onclick="dueloStartGame()">✨ INICIAR DUELO ✨</button>
      <div id="duelo-msg" class="alert" style="display:none;"></div>
    </div>

    <div id="duelo-game" style="display:none;">
      <div class="card">
        <div class="lives-display">❤️ <span id="duelo-lives">0</span> VIDAS</div>
        <div class="info-row">
          <span>🎲 Apuesta:</span>
          <strong>$<span id="duelo-bet-display">0</span></strong>
        </div>
      </div>
      <div class="card" style="padding: 20px;">
        <div id="duelo-grid" class="game-grid"></div>
        <button class="btn-primary" style="background: #2c2c3e; margin-top: 20px;" onclick="dueloEndGame(true)">🏳️ ABANDONAR PARTIDA</button>
        <div id="duelo-game-msg" class="alert" style="display:none;"></div>
      </div>
    </div>

    <div id="duelo-result" class="card" style="display:none; text-align:center;">
      <h2 id="duelo-result-title" style="color:#f3cd81;">🏆 RESULTADO</h2>
      <div id="duelo-result-detail" style="margin:24px 0; font-size:1.1rem;"></div>
      <button class="btn-primary" onclick="resetToMenu()">🔄 JUGAR DE NUEVO</button>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC8jSaP8e1UvLDn2sDdIyo2Z9o_KNhSEro",
    authDomain: "tuesa-oficial.firebaseapp.com",
    projectId: "tuesa-oficial",
    storageBucket: "tuesa-oficial.firebasestorage.app",
    messagingSenderId: "447951557213",
    appId: "1:447951557213:web:293e062ae3fe474c1cb3b4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let currentUser = null;
  let dueloState = {
    selectedSquare: null,
    lives: 0,
    gridSize: 7,
    bet: 0,
    maxLives: 10,
    payoutPercentage: 7.5,
    activeGame: false
  };

  function showMsg(containerId, type, text) {
    const el = document.getElementById(containerId);
    if (el) {
      el.className = 'alert ' + type;
      el.textContent = text;
      el.style.display = 'block';
      setTimeout(() => { if (el) el.style.display = 'none'; }, 4000);
    }
  }

  async function updateGlobalMoneyDisplay(newAmount) {
    if (!currentUser) return;
    currentUser.dinero = newAmount;
    const moneySpan = document.getElementById('money-display');
    if (moneySpan) moneySpan.textContent = `$${newAmount.toFixed(2)}`;
    const saldoSpan = document.getElementById('saldo-display');
    if (saldoSpan) saldoSpan.textContent = `$${newAmount.toFixed(2)}`;
  }

  async function syncUserToFirestore() {
    if (!currentUser) return;
    await db.collection('cuentas').doc(currentUser.docId).update({ dinero: currentUser.dinero });
  }

  async function autoLoginAndLoadUser() {
    let userId = localStorage.getItem('betldp_user_id');
    if (userId) {
      const doc = await db.collection('cuentas').doc(userId).get();
      if (doc.exists) {
        currentUser = { docId: doc.id, ...doc.data() };
        await updateGlobalMoneyDisplay(currentUser.dinero);
        return true;
      }
    }
    const testSnap = await db.collection('cuentas').where('correo', '==', 'test@duelo.com').get();
    if (!testSnap.empty) {
      currentUser = { docId: testSnap.docs[0].id, ...testSnap.docs[0].data() };
    } else {
      const newUser = { user: 'Duelero', correo: 'test@duelo.com', clave: 'duel123', dinero: 1500 };
      const docRef = await db.collection('cuentas').add(newUser);
      currentUser = { docId: docRef.id, ...newUser };
    }
    localStorage.setItem('betldp_user_id', currentUser.docId);
    await updateGlobalMoneyDisplay(currentUser.dinero);
    return true;
  }

  // Modifica el dinero del usuario (deducción o premio)
  async function modifyUserMoney(amountChange, isAdding = false) {
    if (!currentUser) return false;
    let newMoney = currentUser.dinero;
    if (isAdding) newMoney += amountChange;
    else newMoney -= amountChange;
    if (newMoney < 0) return false;
    currentUser.dinero = newMoney;
    await updateGlobalMoneyDisplay(newMoney);
    await syncUserToFirestore();
    return true;
  }

  // Configura grid y elige casilla SECRETA
  function dueloSetupGrid() {
    const grid = document.getElementById('duelo-grid');
    const size = dueloState.gridSize;
    let squareSize = size === 10 ? '42px' : '48px';
    grid.style.gridTemplateColumns = `repeat(${size}, ${squareSize})`;
    grid.innerHTML = '';
    // elegir una casilla aleatoria para la victoria
    const totalCells = size * size;
    dueloState.selectedSquare = Math.floor(Math.random() * totalCells);
    dueloState.lives = dueloState.maxLives;
    document.getElementById('duelo-lives').textContent = dueloState.lives;

    for (let i = 0; i < totalCells; i++) {
      const square = document.createElement('div');
      square.className = 'grid-square';
      square.style.width = squareSize;
      square.style.height = squareSize;
      square.setAttribute('data-index', i);
      square.onclick = (function(idx) { return function() { dueloCheckSquare(idx); }; })(i);
      grid.appendChild(square);
    }
  }

  // Lógica principal al hacer clic en una casilla
  async function dueloCheckSquare(index) {
    if (!dueloState.activeGame) return;
    if (dueloState.lives <= 0) {
      await dueloEndGame(false);
      return;
    }

    const size = dueloState.gridSize;
    const secretRow = Math.floor(dueloState.selectedSquare / size);
    const secretCol = dueloState.selectedSquare % size;
    const clickedRow = Math.floor(index / size);
    const clickedCol = index % size;
    const squares = document.querySelectorAll('#duelo-grid div');
    if (!squares[index]) return;

    const clickedSquare = squares[index];

    // CASO VICTORIA -> premio
    if (index === dueloState.selectedSquare) {
      dueloState.activeGame = false;
      clickedSquare.style.background = '#2a9d6e';
      clickedSquare.style.borderColor = '#f5c542';
      clickedSquare.textContent = '✨';
      const profitBonus = dueloState.bet * (dueloState.payoutPercentage / 100);
      const totalWin = dueloState.bet + profitBonus;
      await modifyUserMoney(totalWin, true);
      
      // mostrar resultado victoria
      document.getElementById('duelo-game').style.display = 'none';
      document.getElementById('duelo-result').style.display = 'block';
      document.getElementById('duelo-result-title').innerHTML = '🎉 ¡DUELO GANADO! 🎉';
      document.getElementById('duelo-result-detail').innerHTML = `
        <div style="font-size:1.3rem; margin:10px 0;">💵 GANANCIA NETA: +$${totalWin.toFixed(2)}</div>
        <div>💰 Nuevo saldo: $${currentUser.dinero.toFixed(2)}</div>
        <div style="margin-top:8px;">🎯 ¡Elegiste la línea exacta!</div>
      `;
      dueloState.activeGame = false;
      return;
    }

    // Fallo -> pérdida de vida + feedback visual
    dueloState.lives--;
    document.getElementById('duelo-lives').textContent = dueloState.lives;
    
    // efecto visual según pista: Misma columna? Misma fila? o ninguna
    if (clickedCol === secretCol) {
      clickedSquare.style.background = '#e67e22';  // naranja (columna)
      clickedSquare.style.borderColor = '#faa75e';
      clickedSquare.textContent = '▼';
    } 
    else if (clickedRow === secretRow) {
      clickedSquare.style.background = '#2980b9';  // azul (fila)
      clickedSquare.style.borderColor = '#5faee3';
      clickedSquare.textContent = '▶';
    } 
    else {
      clickedSquare.style.background = '#4a5b6e';
      clickedSquare.style.borderColor = '#6c7f8f';
      clickedSquare.textContent = '✗';
    }
    
    if (dueloState.lives <= 0) {
      // derrota sin premio
      await dueloEndGame(false);
    }
  }

  // Finalizar juego (derrota o abandono)
  async function dueloEndGame(isAbandon = false) {
    if (!dueloState.activeGame && !isAbandon) return;
    dueloState.activeGame = false;
    
    // Mostrar pantalla de derrota (saldo ya fue descontado al inicio)
    document.getElementById('duelo-game').style.display = 'none';
    document.getElementById('duelo-result').style.display = 'block';
    document.getElementById('duelo-result-title').innerHTML = isAbandon ? '🏳️ ABANDONO' : '💀 DERROTA 💀';
    const lostAmount = dueloState.bet;
    document.getElementById('duelo-result-detail').innerHTML = `
      <div style="font-size:1.2rem; margin:12px 0;">❌ Has perdido $${lostAmount.toFixed(2)}</div>
      <div>💰 Saldo actual: $${currentUser?.dinero?.toFixed(2) ?? 0}</div>
      <div style="margin-top:8px;">😔 La línea oculta no fue revelada a tiempo.</div>
    `;
  }

  // Inicio de partida: valida apuesta, aplica descuento, configura partida
  async function dueloStartGame() {
    if (!currentUser) {
      showMsg('duelo-msg', 'error', '⛔ No se pudo cargar tu cuenta. Recarga o inicia sesión.');
      return;
    }

    const diffSelect = document.getElementById('duelo-diff');
    const difficulty = diffSelect.value;
    const rawBet = parseFloat(document.getElementById('duelo-bet').value);
    if (isNaN(rawBet) || rawBet < 1) {
      showMsg('duelo-msg', 'error', '⚠️ Apuesta inválida. Monto mínimo $1');
      return;
    }
    const betAmount = rawBet;
    if (betAmount > currentUser.dinero) {
      showMsg('duelo-msg', 'error', `❌ Saldo insuficiente. Tienes $${currentUser.dinero.toFixed(2)}`);
      return;
    }

    // configurar dificultad
    if (difficulty === 'easy') {
      dueloState.maxLives = 15;
      dueloState.gridSize = 7;
      dueloState.payoutPercentage = 7.5;
    } else if (difficulty === 'normal') {
      dueloState.maxLives = 10;
      dueloState.gridSize = 7;
      dueloState.payoutPercentage = 15;
    } else {
      dueloState.maxLives = 10;
      dueloState.gridSize = 10;
      dueloState.payoutPercentage = 22.5;
    }

    dueloState.bet = betAmount;
    dueloState.activeGame = true;

    // DESCUENTO DE LA APUESTA (riesgo)
    const success = await modifyUserMoney(betAmount, false);
    if (!success) {
      showMsg('duelo-msg', 'error', 'Error al descontar apuesta, saldo insuficiente.');
      return;
    }

    // Mostrar datos en interfaz de juego
    document.getElementById('duelo-bet-display').textContent = betAmount.toFixed(2);
    document.getElementById('duelo-selection').style.display = 'none';
    document.getElementById('duelo-game').style.display = 'block';
    document.getElementById('duelo-result').style.display = 'none';
    
    dueloSetupGrid();
  }

  // Reset visual para volver a menú principal (jugar otra vez)
  function resetToMenu() {
    document.getElementById('duelo-result').style.display = 'none';
    document.getElementById('duelo-game').style.display = 'none';
    document.getElementById('duelo-selection').style.display = 'block';
    // limpiar mensajes residuales
    const msgDiv = document.getElementById('duelo-msg');
    if (msgDiv) msgDiv.style.display = 'none';
    const gameMsg = document.getElementById('duelo-game-msg');
    if (gameMsg) gameMsg.style.display = 'none';
    dueloState.activeGame = false;
  }

  // Carga inicial y refresco periódico del saldo en navbar (actualización dinámica)
  async function init() {
    await autoLoginAndLoadUser();
    // Asegurar que el navbar tenga el saldo correcto después de cada modificación
    if (currentUser) {
      const moneySpan = document.getElementById('money-display');
      if (moneySpan) moneySpan.textContent = `$${currentUser.dinero.toFixed(2)}`;
    }
  }

  init();
</script>
</body>
</html>
