<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Duelo de Líneas - Bet LDP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #0f0f23 100%);
      font-family: 'Raleway', sans-serif;
      color: #e2e2e2;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .game-container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(15, 15, 35, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 30px;
      border: 1px solid rgba(201, 162, 39, 0.3);
    }
    h1 {
      font-family: 'Cinzel', serif;
      text-align: center;
      color: #c9a227;
      margin-bottom: 30px;
    }
    .back-btn {
      background: rgba(201, 162, 39, 0.2);
      border: 1px solid rgba(201, 162, 39, 0.4);
      color: #c9a227;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .card {
      background: rgba(26, 26, 46, 0.6);
      border: 1px solid rgba(201, 162, 39, 0.2);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .game-grid {
      display: grid;
      gap: 6px;
      justify-content: center;
      margin: 20px 0;
    }
    .grid-square {
      background: rgba(201, 162, 39, 0.15);
      border: 1px solid rgba(201, 162, 39, 0.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    .grid-square:hover { background: rgba(201, 162, 39, 0.3); transform: scale(1.02); }
    .btn-primary {
      background: linear-gradient(135deg, #c9a227, #a07c1a);
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    select, input {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201, 162, 39, 0.3);
      border-radius: 8px;
      color: white;
      margin: 10px 0;
    }
    .alert { padding: 12px; border-radius: 8px; margin-top: 15px; text-align: center; }
    .alert.error { background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; color: #e74c3c; }
    .alert.success { background: rgba(46, 204, 113, 0.2); border: 1px solid #2ecc71; color: #2ecc71; }
    .lives-display { font-size: 28px; font-weight: bold; color: #c9a227; text-align: center; }
  </style>
</head>
<body>
<div class="game-container">
  <button class="back-btn" onclick="window.location.href='../index.html'">← Volver al casino</button>
  <h1>⚔️ DUELO DE LÍNEAS ⚔️</h1>
  
  <div id="duelo-selection" class="card">
    <div style="font-size:24px; font-weight:bold; color:#c9a227; text-align:center; margin-bottom:20px;" id="saldo-display">$0</div>
    <label>Dificultad</label>
    <select id="duelo-diff">
      <option value="easy">🟢 Fácil (15 vidas, 7x7) - 7.5%</option>
      <option value="normal">🟡 Medio (10 vidas, 7x7) - 15%</option>
      <option value="hard">🔴 Difícil (10 vidas, 10x10) - 22.5%</option>
    </select>
    <label>Tu apuesta ($)</label>
    <input type="number" id="duelo-bet" placeholder="Ingresa tu apuesta" min="1" step="0.01">
    <button class="btn-primary" onclick="dueloStartGame()">Iniciar partida</button>
    <div id="duelo-msg" class="alert" style="display:none;"></div>
  </div>

  <div id="duelo-game" style="display:none;">
    <div class="card">
      <div class="lives-display">❤️ <span id="duelo-lives">0</span> vidas</div>
      <div>Apuesta: $<span id="duelo-bet-display">0</span></div>
    </div>
    <div class="card">
      <div id="duelo-grid" class="game-grid"></div>
      <button class="btn-primary" style="background:#333; margin-top:16px;" onclick="dueloEndGame()">Abandonar partida</button>
      <div id="duelo-game-msg" class="alert" style="display:none;"></div>
    </div>
  </div>

  <div id="duelo-result" class="card" style="display:none; text-align:center;">
    <h2 id="duelo-result-title">🎉 Resultado</h2>
    <div id="duelo-result-detail" style="margin:20px 0;"></div>
    <button class="btn-primary" onclick="location.reload()">Jugar de nuevo</button>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC8jSaP8e1UvLDn2sDdIyo2Z9o_KNhSEro",
    authDomain: "tuesa-oficial.firebaseapp.com",
    projectId: "tuesa-oficial",
    storageBucket: "tuesa-oficial.firebasestorage.app",
    messagingSenderId: "447951557213",
    appId: "1:447951557213:web:293e062ae3fe474c1cb3b4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let currentUser = null;
  let dueloState = {
    selectedSquare: null, lives: 0, gridSize: 7,
    bet: 0, maxLives: 0, payoutPercentage: 7.5
  };

  function showMsg(containerId, type, text) {
    const el = document.getElementById(containerId);
    if (el) {
      el.className = 'alert ' + type;
      el.textContent = text;
      el.style.display = 'block';
      setTimeout(() => { if (el) el.style.display = 'none'; }, 4000);
    }
  }

  async function autoLogin() {
    const savedUserId = localStorage.getItem('betldp_user_id');
    const savedEmail = localStorage.getItem('betldp_user_email');
    if (!savedUserId || !savedEmail) return false;
    try {
      const doc = await db.collection('cuentas').doc(savedUserId).get();
      if (doc.exists && doc.data().correo === savedEmail) {
        currentUser = { docId: doc.id, ...doc.data() };
        document.getElementById('saldo-display').textContent = '$' + currentUser.dinero.toFixed(2);
        return true;
      }
    } catch(e) { console.warn(e); }
    return false;
  }

  async function updateUserMoney(newAmount) {
    if (!currentUser) return;
    currentUser.dinero = newAmount;
    document.getElementById('saldo-display').textContent = '$' + newAmount.toFixed(2);
    await db.collection('cuentas').doc(currentUser.docId).update({ dinero: newAmount });
  }

  function dueloSetupGrid() {
    const grid = document.getElementById('duelo-grid');
    const size = dueloState.gridSize;
    let squareSize = size === 10 ? '32px' : '40px';
    grid.style.gridTemplateColumns = `repeat(${size}, ${squareSize})`;
    grid.innerHTML = '';
    dueloState.selectedSquare = Math.floor(Math.random() * size * size);
    dueloState.lives = dueloState.maxLives;
    document.getElementById('duelo-lives').textContent = dueloState.lives;

    for (let i = 0; i < size * size; i++) {
      const square = document.createElement('div');
      square.className = 'grid-square';
      square.style.width = squareSize;
      square.style.height = squareSize;
      square.onclick = () => dueloCheckSquare(i);
      grid.appendChild(square);
    }
  }

  async function dueloCheckSquare(index) {
    if (dueloState.lives <= 0) return;
    const size = dueloState.gridSize;
    const selectedRow = Math.floor(dueloState.selectedSquare / size);
    const selectedCol = dueloState.selectedSquare % size;
    const clickedRow = Math.floor(index / size);
    const clickedCol = index % size;
    const squares = document.querySelectorAll('#duelo-grid div');
    const clickedSquare = squares[index];

    if (index === dueloState.selectedSquare) {
      clickedSquare.style.background = '#27ae60';
      clickedSquare.textContent = '✓';
      const payout = dueloState.bet * (dueloState.payoutPercentage / 100);
      await updateUserMoney(currentUser.dinero + dueloState.bet + payout);
      document.getElementById('duelo-game').style.display = 'none';
      document.getElementById('duelo-result').style.display = 'block';
      document.getElementById('duelo-result-title').innerHTML = '🎉 ¡VICTORIA! 🎉';
      document.getElementById('duelo-result-detail').innerHTML = `Ganancia: +$${(dueloState.bet + payout).toFixed(2)}<br>Saldo: $${currentUser.dinero.toFixed(2)}`;
    } else {
      dueloState.lives--;
      document.getElementById('duelo-lives').textContent = dueloState.lives;
      if (clickedCol === selectedCol) clickedSquare.style.background = '#f39c12';
      else if (clickedRow === selectedRow) clickedSquare.style.background = '#3498db';
      else clickedSquare.style.background = '#34495e';
      if (dueloState.lives <= 0) dueloEndGame();
    }
  }

  async function dueloEndGame() {
    document.getElementById('duelo-game').style.display = 'none';
    document.getElementById('duelo-result').style.display = 'block';
    document.getElementById('duelo-result-title').innerHTML = '💀 Derrota 💀';
    document.getElementById('duelo-result-detail').innerHTML = `Perdiste $${dueloState.bet.toFixed(2)}<br>Saldo: $${currentUser.dinero.toFixed(2)}`;
  }

  async function dueloStartGame() {
    if (!currentUser) { showMsg('duelo-msg', 'error', 'Debés iniciar sesión.'); return; }
    const diff = document.getElementById('duelo-diff').value;
    const bet = parseFloat(document.getElementById('duelo-bet').value);
    if (!bet || bet <= 0) { showMsg('duelo-msg', 'error', 'Apuesta válida requerida.'); return; }
    if (bet > currentUser.dinero) { showMsg('duelo-msg', 'error', 'Saldo insuficiente.'); return; }

    dueloState.bet = bet;
    if (diff === 'easy') { dueloState.maxLives = 15; dueloState.gridSize = 7; dueloState.payoutPercentage = 7.5; }
    else if (diff === 'normal') { dueloState.maxLives = 10; dueloState.gridSize = 7; dueloState.payoutPercentage = 15; }
    else { dueloState.maxLives = 10; dueloState.gridSize = 10; dueloState.payoutPercentage = 22.5; }

    await updateUserMoney(currentUser.dinero - bet);
    document.getElementById('duelo-bet-display').textContent = bet.toFixed(2);
    document.getElementById('duelo-selection').style.display = 'none';
    document.getElementById('duelo-game').style.display = 'block';
    dueloSetupGrid();
  }

  autoLogin();
</script>
</body>
</html>
