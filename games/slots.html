<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Slots - Bet LDP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../assets/logo3.png">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/slots.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
<nav id="navbar">
  <div id="navbar-left">
    <button id="logo-btn" onclick="window.location.href='../app.html'">
      <img src="../assets/logo1.png" alt="BetLDP Logo">
    </button>
  </div>
  <div id="navbar-right">
    <span id="money-display">$0.00</span>
  </div>
</nav>

<div class="game-master">
  <div class="game-container">
    <h1>🎰 TRAGAMONEDAS 🎰</h1>

    <div id="slots-selection" class="card">
      <div class="saldo-premium">
        <div style="font-size: 13px; letter-spacing: 1px; opacity: 0.8;">💰 SALDO ACTUAL</div>
        <div style="font-size: 42px; font-weight: bold; color: #fedb78;" id="saldo-display">$0.00</div>
      </div>
      <div class="bet-options">
        <button class="bet-btn" onclick="setBet(5)">$5</button>
        <button class="bet-btn" onclick="setBet(10)">$10</button>
        <button class="bet-btn" onclick="setBet(25)">$25</button>
        <button class="bet-btn" onclick="setBet(50)">$50</button>
      </div>
      <input type="number" id="custom-bet" placeholder="Apuesta personalizada" min="1" step="1">
      <button class="btn-secondary" onclick="setCustomBet()" style="margin-top: 6px;">✅ Aplicar monto</button>
      <button class="btn-primary" onclick="slotsStartGame()" style="margin-top: 22px;">🎲 EMPEZAR A GIRAR 🎲</button>
      <div id="slots-msg" class="alert" style="display:none;"></div>
    </div>

    <div id="slots-game" style="display:none;">
      <div class="card">
        <div class="reels">
          <div class="slot-reel" id="reel1">🍒</div>
          <div class="slot-reel" id="reel2">🍒</div>
          <div class="slot-reel" id="reel3">🍒</div>
        </div>
        <button class="btn-primary" id="spin-btn" onclick="slotsSpin()">🌀 GIRAR 🎰</button>
        <div class="flex-buttons">
          <button class="btn-secondary" onclick="resetToMenu()">🔄 CAMBIAR APUESTA</button>
          <button class="btn-secondary" onclick="window.location.href='../app.html'">🏠 CASINO</button>
        </div>
        <div id="slots-game-msg" class="alert" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC8jSaP8e1UvLDn2sDdIyo2Z9o_KNhSEro",
    authDomain: "tuesa-oficial.firebaseapp.com",
    projectId: "tuesa-oficial",
    storageBucket: "tuesa-oficial.firebasestorage.app",
    messagingSenderId: "447951557213",
    appId: "1:447951557213:web:293e062ae3fe474c1cb3b4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let currentUser = null;
  let currentBet = 10;
  let isSpinning = false;

  const symbols = ['🍒', '🍋', '🍊', '💎', '7️⃣'];
  const payouts = { '🍒': 3, '🍋': 5, '🍊': 8, '💎': 20, '7️⃣': 50 };

  function showMsg(containerId, type, text) {
    const el = document.getElementById(containerId);
    if (el) {
      el.className = 'alert ' + type;
      el.textContent = text;
      el.style.display = 'block';
      setTimeout(() => { if (el) el.style.display = 'none'; }, 3200);
    }
  }

  async function updateGlobalBalanceDisplay(newAmount) {
    if (!currentUser) return;
    currentUser.dinero = newAmount;
    const moneySpan = document.getElementById('money-display');
    if (moneySpan) moneySpan.textContent = `$${newAmount.toFixed(2)}`;
    const saldoSlot = document.getElementById('saldo-display');
    if (saldoSlot) saldoSlot.textContent = `$${newAmount.toFixed(2)}`;
  }

  async function syncToFirestore() {
    if (!currentUser) return;
    await db.collection('cuentas').doc(currentUser.docId).update({ dinero: currentUser.dinero });
  }

  async function autoLoginAndLoadUser() {
    let userId = localStorage.getItem('betldp_user_id');
    if (userId) {
      const doc = await db.collection('cuentas').doc(userId).get();
      if (doc.exists) {
        currentUser = { docId: doc.id, ...doc.data() };
        await updateGlobalBalanceDisplay(currentUser.dinero);
        return true;
      }
    }
    const demoSnap = await db.collection('cuentas').where('correo', '==', 'slots_player@demo.com').get();
    if (!demoSnap.empty) {
      currentUser = { docId: demoSnap.docs[0].id, ...demoSnap.docs[0].data() };
    } else {
      const newUser = { user: "SlotMaster", correo: "slots_player@demo.com", clave: "jackpot123", dinero: 2500 };
      const docRef = await db.collection('cuentas').add(newUser);
      currentUser = { docId: docRef.id, ...newUser };
    }
    localStorage.setItem('betldp_user_id', currentUser.docId);
    await updateGlobalBalanceDisplay(currentUser.dinero);
    return true;
  }

  async function modifyUserMoney(delta, isAdding) {
    if (!currentUser) return false;
    let newMoney = currentUser.dinero;
    if (isAdding) newMoney += delta;
    else newMoney -= delta;
    if (newMoney < 0) return false;
    currentUser.dinero = newMoney;
    await updateGlobalBalanceDisplay(newMoney);
    await syncToFirestore();
    return true;
  }

  function setBet(amount) {
    currentBet = amount;
    showMsg('slots-msg', 'success', `💰 Apuesta seleccionada: $${amount}`);
  }

  function setCustomBet() {
    const custom = parseFloat(document.getElementById('custom-bet').value);
    if (custom && custom > 0) {
      currentBet = custom;
      showMsg('slots-msg', 'success', `💰 Apuesta personalizada: $${custom.toFixed(2)}`);
    } else {
      showMsg('slots-msg', 'error', '⚠️ Ingresa un monto válido');
    }
  }

  async function slotsStartGame() {
    if (!currentUser) {
      showMsg('slots-msg', 'error', '⛔ No se pudo cargar tu usuario. Reinicia la página.');
      return;
    }
    if (currentBet > currentUser.dinero) {
      showMsg('slots-msg', 'error', `❌ Saldo insuficiente. Tienes $${currentUser.dinero.toFixed(2)}`);
      return;
    }
    document.getElementById('slots-selection').style.display = 'none';
    document.getElementById('slots-game').style.display = 'block';
    isSpinning = false;
    const spinBtn = document.getElementById('spin-btn');
    if (spinBtn) spinBtn.disabled = false;
    const msgGame = document.getElementById('slots-game-msg');
    if (msgGame) msgGame.style.display = 'none';
  }

  async function slotsSpin() {
    if (isSpinning) {
      showMsg('slots-game-msg', 'error', '⏳ Espera a que termine el giro actual');
      return;
    }
    if (!currentUser) return;
    if (currentBet > currentUser.dinero) {
      showMsg('slots-game-msg', 'error', `💸 Saldo insuficiente. Saldo: $${currentUser.dinero.toFixed(2)}`);
      resetToMenu();
      return;
    }

    isSpinning = true;
    const spinBtn = document.getElementById('spin-btn');
    spinBtn.disabled = true;
    spinBtn.innerHTML = '🌀 GIRANDO...';

    // Descontar la apuesta antes del giro
    const betSuccess = await modifyUserMoney(currentBet, false);
    if (!betSuccess) {
      showMsg('slots-game-msg', 'error', 'Error al procesar la apuesta');
      spinBtn.disabled = false;
      spinBtn.innerHTML = '🎰 GIRAR';
      isSpinning = false;
      return;
    }

    const reelsElements = [
      document.getElementById('reel1'),
      document.getElementById('reel2'),
      document.getElementById('reel3')
    ];
    reelsElements.forEach(reel => reel.classList.add('spinning'));

    setTimeout(async () => {
      const results = [];
      for (let i = 0; i < 3; i++) {
        const randomIndex = Math.floor(Math.random() * symbols.length);
        results.push(symbols[randomIndex]);
      }

      // Detener animación y mostrar símbolos
      for (let i = 0; i < 3; i++) {
        reelsElements[i].classList.remove('spinning');
        reelsElements[i].textContent = results[i];
        reelsElements[i].classList.remove('win-glow');
      }

      let winAmount = 0;
      let winMessage = '';

      if (results[0] === results[1] && results[1] === results[2]) {
        winAmount = currentBet * payouts[results[0]];
        winMessage = `🎉 ¡TRES SÍMBOLOS IGUALES! Ganaste $${winAmount.toFixed(2)} 🎉`;
        reelsElements.forEach(reel => reel.classList.add('win-glow'));
        setTimeout(() => reelsElements.forEach(reel => reel.classList.remove('win-glow')), 1500);
      } 
      else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
        winAmount = currentBet * 1.5;
        winMessage = `✨ ¡PAR! Ganaste $${winAmount.toFixed(2)} ✨`;
        if (results[0] === results[1]) {
          reelsElements[0].classList.add('win-glow');
          reelsElements[1].classList.add('win-glow');
        } else if (results[1] === results[2]) {
          reelsElements[1].classList.add('win-glow');
          reelsElements[2].classList.add('win-glow');
        } else if (results[0] === results[2]) {
          reelsElements[0].classList.add('win-glow');
          reelsElements[2].classList.add('win-glow');
        }
        setTimeout(() => {
          reelsElements.forEach(r => r.classList.remove('win-glow'));
        }, 1200);
      } 
      else {
        winMessage = `😢 Sin suerte... perdiste $${currentBet.toFixed(2)}`;
      }

      if (winAmount > 0) {
        await modifyUserMoney(winAmount, true);
        showMsg('slots-game-msg', 'success', winMessage);
      } else {
        showMsg('slots-game-msg', 'error', winMessage);
      }

      isSpinning = false;
      spinBtn.disabled = false;
      spinBtn.innerHTML = '🌀 GIRAR 🎰';
    }, 550);
  }

  function resetToMenu() {
    document.getElementById('slots-game').style.display = 'none';
    document.getElementById('slots-selection').style.display = 'block';
    const msgSel = document.getElementById('slots-msg');
    if (msgSel) msgSel.style.display = 'none';
    const msgGame = document.getElementById('slots-game-msg');
    if (msgGame) msgGame.style.display = 'none';
    isSpinning = false;
    const spinBtn = document.getElementById('spin-btn');
    if (spinBtn) {
      spinBtn.disabled = false;
      spinBtn.innerHTML = '🌀 GIRAR 🎰';
    }
    if (currentUser) {
      document.getElementById('saldo-display').textContent = `$${currentUser.dinero.toFixed(2)}`;
      const moneySpan = document.getElementById('money-display');
      if (moneySpan) moneySpan.textContent = `$${currentUser.dinero.toFixed(2)}`;
    }
  }

  async function init() {
    await autoLoginAndLoadUser();
    if (currentUser) {
      document.getElementById('money-display').textContent = `$${currentUser.dinero.toFixed(2)}`;
      document.getElementById('saldo-display').textContent = `$${currentUser.dinero.toFixed(2)}`;
    }
  }

  init();
</script>
</body>
</html>
