<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Lucky Draw - Bet LDP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../logo3.png">
  <link rel="stylesheet" href="../styles/global.css">
  <!-- No external slots.css, all styles embedded below -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    /* fresh game styles - only used for Lucky Draw, no slots leftovers */
    .game-master {
      min-height: 100vh;
      background: linear-gradient(145deg, #0a0c12 0%, #0f1219 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }

    .game-container {
      max-width: 650px;
      width: 100%;
      margin: 0 auto;
      font-family: 'Raleway', sans-serif;
    }

    .game-container h1 {
      font-family: 'Cinzel', serif;
      text-align: center;
      color: #f5c542;
      text-shadow: 0 0 8px rgba(245,197,66,0.5);
      margin-bottom: 1.5rem;
      font-size: 2.2rem;
      letter-spacing: 2px;
    }

    .card {
      background: rgba(20, 24, 35, 0.9);
      backdrop-filter: blur(6px);
      border-radius: 2rem;
      padding: 1.8rem 1.5rem;
      border: 1px solid rgba(245, 197, 66, 0.3);
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6);
      transition: all 0.2s;
    }

    .saldo-premium {
      background: #03060e;
      border-radius: 1.5rem;
      padding: 1.2rem;
      text-align: center;
      margin-bottom: 1.8rem;
      border-bottom: 2px solid #f5c542;
    }

    .saldo-premium div:first-child {
      color: #b9c7d9;
      font-weight: 500;
    }

    #saldo-display {
      font-size: 2.8rem;
      font-weight: bold;
      background: linear-gradient(135deg, #fedb78, #f5a623);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
    }

    .bet-options {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      margin: 1rem 0 0.8rem;
    }

    .bet-btn {
      background: #1e2538;
      border: none;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 0.6rem 1.2rem;
      border-radius: 3rem;
      color: #f5e7c8;
      cursor: pointer;
      transition: 0.1s linear;
      font-family: 'Raleway', monospace;
      box-shadow: 0 3px 0 #0a0e16;
    }

    .bet-btn:hover {
      background: #2f3a55;
      transform: translateY(-2px);
    }

    .bet-btn:active {
      transform: translateY(2px);
      box-shadow: none;
    }

    #custom-bet {
      background: #10131e;
      border: 1px solid #3e4a66;
      padding: 0.7rem 1rem;
      border-radius: 2rem;
      width: 100%;
      color: #f5e7c8;
      font-size: 1rem;
      text-align: center;
      font-weight: 500;
      margin-top: 10px;
    }

    .btn-primary {
      background: linear-gradient(95deg, #e0a82b, #f5c542);
      border: none;
      font-weight: bold;
      font-size: 1.25rem;
      padding: 0.85rem;
      border-radius: 3rem;
      color: #0c0f17;
      cursor: pointer;
      width: 100%;
      font-family: 'Cinzel', serif;
      transition: 0.2s;
      letter-spacing: 1px;
    }

    .btn-primary:hover {
      background: linear-gradient(95deg, #f5b82e, #ffd966);
      transform: scale(0.98);
      box-shadow: 0 0 12px rgba(245,197,66,0.5);
    }

    .btn-secondary {
      background: #262e42;
      border: none;
      padding: 0.6rem 1rem;
      border-radius: 2rem;
      color: #e0e6f0;
      font-weight: 600;
      cursor: pointer;
      transition: 0.1s;
      font-family: 'Raleway', sans-serif;
    }

    .btn-secondary:hover {
      background: #3c4768;
    }

    .flex-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.2rem;
    }

    .alert {
      margin-top: 1rem;
      padding: 0.7rem;
      border-radius: 2rem;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .alert.success {
      background: #1b3b2a;
      color: #a3f0b0;
      border-left: 5px solid #2ecc71;
    }

    .alert.error {
      background: #3e1e25;
      color: #ffaeae;
      border-left: 5px solid #e74c3c;
    }

    /* DRAW GAME SPECIFIC */
    .draw-area {
      text-align: center;
      margin: 1.5rem 0;
    }

    .mystery-chest {
      background: radial-gradient(circle at 30% 20%, #2a2e45, #141824);
      width: 160px;
      height: 160px;
      margin: 0 auto 1.2rem;
      border-radius: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      border: 2px solid #e0aa3a;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .mystery-chest:hover {
      transform: scale(1.02);
      border-color: #ffcd6b;
    }

    .chest-icon {
      font-size: 5rem;
      filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.5));
    }

    .prize-reveal {
      font-size: 2rem;
      font-weight: bold;
      background: #04070e;
      padding: 0.5rem;
      border-radius: 2rem;
      margin: 0.7rem 0;
    }

    .multiplier-badge {
      background: #222842;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      display: inline-block;
      font-weight: bold;
      font-size: 0.85rem;
      color: #f5c542;
    }

    .history-list {
      max-height: 150px;
      overflow-y: auto;
      font-size: 0.75rem;
      background: #0b0e16;
      border-radius: 1rem;
      padding: 0.5rem;
      margin-top: 1rem;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #2a2f3f;
      padding: 0.3rem 0.5rem;
      color: #ccc;
    }

    .win-record {
      color: #f5c542;
      font-weight: bold;
    }
  </style>
</head>
<body>
<nav id="navbar">
  <div id="navbar-left">
    <button id="logo-btn" onclick="window.location.href='../app.html'">
      <img src="../logo1.png" alt="BetLDP Logo">
    </button>
  </div>
  <div id="navbar-right">
    <span id="money-display">$0.00</span>
  </div>
</nav>

<div class="game-master">
  <div class="game-container">
    <h1>🎁 CAJA MISTERIOSA 🎁</h1>

    <!-- Selección de apuesta -->
    <div id="bet-selection-panel" class="card">
      <div class="saldo-premium">
        <div style="font-size: 13px; letter-spacing: 1px; opacity: 0.8;">💰 TU CRÉDITO</div>
        <div style="font-size: 42px; font-weight: bold; color: #fedb78;" id="saldo-display">$0.00</div>
      </div>
      <div class="bet-options">
        <button class="bet-btn" data-bet="5">$5</button>
        <button class="bet-btn" data-bet="10">$10</button>
        <button class="bet-btn" data-bet="25">$25</button>
        <button class="bet-btn" data-bet="50">$50</button>
      </div>
      <input type="number" id="custom-bet-input" placeholder="Monto personalizado" min="1" step="1">
      <button class="btn-secondary" id="apply-custom-btn" style="margin-top: 6px;">✅ Usar monto</button>
      <button class="btn-primary" id="start-game-btn" style="margin-top: 22px;">🎲 ABRIR CAJA 🎲</button>
      <div id="bet-message-area" class="alert" style="display:none;"></div>
    </div>

    <!-- Panel de juego: "Lucky Draw" -->
    <div id="game-play-panel" style="display:none;">
      <div class="card">
        <div class="saldo-premium" style="margin-bottom: 0.8rem;">
          <div>APUESTA ACTUAL</div>
          <div style="font-size: 1.8rem; font-weight: bold;" id="current-bet-display">$0</div>
        </div>
        
        <div class="draw-area">
          <div id="mystery-chest" class="mystery-chest">
            <div class="chest-icon" id="chest-icon">🎁</div>
          </div>
          <div id="result-message" class="prize-reveal" style="font-size: 1.2rem;">⬅️ Haz clic en el cofre</div>
          <div class="multiplier-badge" id="multiplier-hint">Ronda sin jugar</div>
        </div>

        <button class="btn-primary" id="draw-action-btn">✨ ABRIR COFRE ✨</button>
        <div class="flex-buttons">
          <button class="btn-secondary" id="change-bet-btn">🔄 CAMBIAR APUESTA</button>
          <button class="btn-secondary" id="casino-home-btn">🏠 CASINO</button>
        </div>
        <div id="game-message-area" class="alert" style="display:none;"></div>
        
        <!-- Historial de últimos resultados -->
        <div style="margin-top: 1rem;">
          <div style="font-size: 0.8rem; color:#aaa; text-align:center;">📜 ÚLTIMOS PREMIOS</div>
          <div id="history-list" class="history-list">
            <div style="text-align:center; padding:0.3rem;">— Sin movimientos —</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ---------- FIREBASE INIT (preserved same config) ----------
  const firebaseConfig = {
    apiKey: "AIzaSyC8jSaP8e1UvLDn2sDdIyo2Z9o_KNhSEro",
    authDomain: "tuesa-oficial.firebaseapp.com",
    projectId: "tuesa-oficial",
    storageBucket: "tuesa-oficial.firebasestorage.app",
    messagingSenderId: "447951557213",
    appId: "1:447951557213:web:293e062ae3fe474c1cb3b4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let currentUser = null;
  let currentBet = 10;          // apuesta actual
  let canPlay = true;           // evitar doble acción
  let gameHistory = [];         // almacena últimos resultados (strings)
  const MAX_HISTORY = 6;

  // ---- AUX FUNCTIONS (legacy, but modified for new game) ----
  function showMsg(containerId, type, text) {
    const el = document.getElementById(containerId);
    if (el) {
      el.className = 'alert ' + type;
      el.textContent = text;
      el.style.display = 'block';
      setTimeout(() => { if (el) el.style.display = 'none'; }, 3200);
    }
  }

  async function updateGlobalBalanceDisplay(newAmount) {
    if (!currentUser) return;
    currentUser.dinero = newAmount;
    const moneySpan = document.getElementById('money-display');
    if (moneySpan) moneySpan.textContent = `$${newAmount.toFixed(2)}`;
    const saldoSlot = document.getElementById('saldo-display');
    if (saldoSlot) saldoSlot.textContent = `$${newAmount.toFixed(2)}`;
  }

  async function syncToFirestore() {
    if (!currentUser) return;
    await db.collection('cuentas').doc(currentUser.docId).update({ dinero: currentUser.dinero });
  }

  async function autoLoginAndLoadUser() {
    let userId = localStorage.getItem('betldp_user_id');
    if (userId) {
      const doc = await db.collection('cuentas').doc(userId).get();
      if (doc.exists) {
        currentUser = { docId: doc.id, ...doc.data() };
        await updateGlobalBalanceDisplay(currentUser.dinero);
        return true;
      }
    }
    const demoSnap = await db.collection('cuentas').where('correo', '==', 'slots_player@demo.com').get();
    if (!demoSnap.empty) {
      currentUser = { docId: demoSnap.docs[0].id, ...demoSnap.docs[0].data() };
    } else {
      const newUser = { user: "LuckyDrawPlayer", correo: "slots_player@demo.com", clave: "jackpot123", dinero: 2500 };
      const docRef = await db.collection('cuentas').add(newUser);
      currentUser = { docId: docRef.id, ...newUser };
    }
    localStorage.setItem('betldp_user_id', currentUser.docId);
    await updateGlobalBalanceDisplay(currentUser.dinero);
    return true;
  }

  async function modifyUserMoney(delta, isAdding) {
    if (!currentUser) return false;
    let newMoney = currentUser.dinero;
    if (isAdding) newMoney += delta;
    else newMoney -= delta;
    if (newMoney < 0) return false;
    currentUser.dinero = newMoney;
    await updateGlobalBalanceDisplay(newMoney);
    await syncToFirestore();
    return true;
  }

  // -------- NUEVO JUEGO: "LUCKY DRAW / CAJA MISTERIOSA" ----------
  // Lógica de premios: cada apertura tiene multiplicador oculto y posibilidad de premio instantáneo.
  // Se paga apuesta * multiplicador (redondeado)
  // Reglas: el jugador paga la apuesta, luego abre cofre. Multiplicadores: 0x (pierde todo), 0.5x, 1.2x, 2x, 3x, 5x, 10x ocasional, 25x super jackpot.
  // Además existe un pequeño "bonus" aleatorio extra.
  // Para hacerlo emocionante: se usa reveal animado. No es slots, ni dados, ni ruleta, ni blackjack, ni Ta-Te-Ti.
  
  function getRandomMultiplier() {
    // Probabilidades estilo tragamonedas pero no es slots tradicional, es "Caja Misteriosa"
    const r = Math.random() * 100;
    if (r < 40) return 0;           // 40% pierde la apuesta (0x)
    if (r < 58) return 0.5;         // 18% recupera la mitad
    if (r < 72) return 1.2;         // 14% 1.2x (ganancia baja)
    if (r < 84) return 2;           // 12% dobla
    if (r < 92) return 3;           // 8% triple
    if (r < 96) return 5;           // 4% 5x
    if (r < 98.5) return 10;        // 2.5% 10x
    return 25;                      // 1.5% Super premio 25x
  }

  // Función principal del juego: aplicar apuesta, calcular resultado y actualizar saldo
  async function executeLuckyDraw() {
    if (!canPlay) {
      showMsg('game-message-area', 'error', '⏳ Espera, ya estamos procesando.');
      return false;
    }
    if (!currentUser) {
      showMsg('game-message-area', 'error', '⛔ Usuario no cargado.');
      return false;
    }
    if (currentBet <= 0) {
      showMsg('game-message-area', 'error', '⚠️ Apuesta inválida.');
      return false;
    }
    if (currentBet > currentUser.dinero) {
      showMsg('game-message-area', 'error', `❌ Saldo insuficiente. Tienes $${currentUser.dinero.toFixed(2)}`);
      // sugerir cambiar apuesta
      return false;
    }

    canPlay = false;
    const actionBtn = document.getElementById('draw-action-btn');
    const chestDiv = document.getElementById('mystery-chest');
    const resultDiv = document.getElementById('result-message');
    const originalChestIcon = document.getElementById('chest-icon');
    
    // Efecto visual de apertura
    if (originalChestIcon) originalChestIcon.innerHTML = '🎲';
    chestDiv.style.transform = 'scale(0.96)';
    setTimeout(() => { if(chestDiv) chestDiv.style.transform = ''; }, 200);
    
    // Descontar apuesta antes del resultado
    const deductOk = await modifyUserMoney(currentBet, false);
    if (!deductOk) {
      showMsg('game-message-area', 'error', 'Error al procesar la apuesta.');
      canPlay = true;
      if (actionBtn) actionBtn.disabled = false;
      if (originalChestIcon) originalChestIcon.innerHTML = '🎁';
      return false;
    }

    // Obtener multiplicador
    const multiplier = getRandomMultiplier();
    let grossWin = currentBet * multiplier;
    // redondear a 2 decimales
    grossWin = Math.round(grossWin * 100) / 100;
    let winAmount = grossWin;
    let message = '';
    let winClass = 'error';
    let historyEntry = '';

    if (multiplier === 0) {
      message = `💀 ¡MALA SUERTE! El cofre estaba vacío. Perdiste $${currentBet.toFixed(2)}. 💀`;
      winClass = 'error';
      historyEntry = `❌ -$${currentBet.toFixed(2)}`;
      winAmount = 0;
    } else {
      // Agregar ganancia al usuario
      const successAdd = await modifyUserMoney(winAmount, true);
      if (!successAdd) {
        // Esto no debería pasar, pero si pasa, revertimos? pero no hay fallo, es solo sincronía.
        showMsg('game-message-area', 'error', 'Error inesperado al acreditar premio.');
        canPlay = true;
        if (actionBtn) actionBtn.disabled = false;
        if (originalChestIcon) originalChestIcon.innerHTML = '🎁';
        return false;
      }
      let emoji = '';
      if (multiplier >= 10) emoji = '🔥🔥 JACKPOT 🔥🔥';
      else if (multiplier >= 5) emoji = '✨ GRAN PREMIO ✨';
      else if (multiplier >= 2) emoji = '🍀 GANASTE 🍀';
      else emoji = '🎉 PREMIO 🎉';
      message = `${emoji} ¡Multiplicador ${multiplier}x! Recibiste $${winAmount.toFixed(2)}. `;
      if (multiplier === 25) message = `🏆 ¡MEGA PREMIO! 25x 🏆 Ganaste $${winAmount.toFixed(2)} 🏆`;
      winClass = 'success';
      historyEntry = `✅ +$${winAmount.toFixed(2)} (${multiplier}x)`;
    }

    // Actualizar UI de resultado con animación
    resultDiv.innerHTML = message;
    showMsg('game-message-area', winClass === 'success' ? 'success' : 'error', message);
    
    // Añadir al historial
    gameHistory.unshift(historyEntry);
    if (gameHistory.length > MAX_HISTORY) gameHistory.pop();
    updateHistoryUI();
    
    // Cambiar icono del cofre por unos segundos
    if (originalChestIcon) {
      if (multiplier === 0) originalChestIcon.innerHTML = '💀';
      else if (multiplier >= 10) originalChestIcon.innerHTML = '🏆';
      else originalChestIcon.innerHTML = '💰';
      setTimeout(() => {
        if (originalChestIcon) originalChestIcon.innerHTML = '🎁';
      }, 1500);
    }
    
    // Actualizar el indicador de multiplicador
    const multiplierHint = document.getElementById('multiplier-hint');
    if (multiplierHint) {
      if (multiplier === 0) multiplierHint.innerHTML = '💀 Cofre vacío ...💀';
      else multiplierHint.innerHTML = `✨ Premio ${multiplier}x ✨`;
      setTimeout(() => {
        if (multiplierHint && document.getElementById('game-play-panel').style.display !== 'none')
          multiplierHint.innerHTML = '🎲 Nueva oportunidad 🎲';
      }, 2200);
    }
    
    canPlay = true;
    if (actionBtn) actionBtn.disabled = false;
    return true;
  }

  function updateHistoryUI() {
    const historyContainer = document.getElementById('history-list');
    if (!historyContainer) return;
    if (gameHistory.length === 0) {
      historyContainer.innerHTML = '<div style="text-align:center; padding:0.3rem;">— Sin movimientos —</div>';
      return;
    }
    let html = '';
    gameHistory.forEach(entry => {
      const isWin = entry.includes('+');
      html += `<div class="history-item"><span>🎲</span><span class="${isWin ? 'win-record' : ''}">${entry}</span><span>⏱️</span></div>`;
    });
    historyContainer.innerHTML = html;
  }

  // -------- FLUJO DE PANTALLAS (similar pero completamente renovado) ----------
  function setBet(amount) {
    if (amount > 0) {
      currentBet = amount;
      showMsg('bet-message-area', 'success', `💰 Apuesta fijada: $${currentBet.toFixed(2)}`);
      const customInput = document.getElementById('custom-bet-input');
      if (customInput) customInput.value = '';
    }
  }

  function setCustomBet() {
    const customInput = document.getElementById('custom-bet-input');
    let customVal = parseFloat(customInput.value);
    if (isNaN(customVal) || customVal <= 0) {
      showMsg('bet-message-area', 'error', '⚠️ Monto inválido.');
      return;
    }
    customVal = Math.floor(customVal * 100) / 100;
    if (customVal < 1) customVal = 1;
    currentBet = customVal;
    showMsg('bet-message-area', 'success', `💰 Apuesta personalizada: $${currentBet.toFixed(2)}`);
    customInput.value = '';
  }

  async function startGameHandler() {
    if (!currentUser) {
      showMsg('bet-message-area', 'error', '⛔ Error de usuario, recarga la página.');
      return;
    }
    if (currentBet > currentUser.dinero) {
      showMsg('bet-message-area', 'error', `❌ Saldo insuficiente. Tienes $${currentUser.dinero.toFixed(2)}`);
      return;
    }
    if (currentBet <= 0) {
      showMsg('bet-message-area', 'error', 'Selecciona una apuesta válida');
      return;
    }
    // Ocultar panel de selección y mostrar juego
    document.getElementById('bet-selection-panel').style.display = 'none';
    document.getElementById('game-play-panel').style.display = 'block';
    const betDisplaySpan = document.getElementById('current-bet-display');
    if (betDisplaySpan) betDisplaySpan.textContent = `$${currentBet.toFixed(2)}`;
    const hintSpan = document.getElementById('multiplier-hint');
    if (hintSpan) hintSpan.innerHTML = '💰 Haz clic en el cofre 💰';
    // Reset resultado
    const resultDiv = document.getElementById('result-message');
    if (resultDiv) resultDiv.innerHTML = '⬅️ ¡Abre la caja y gana!';
    const msgGame = document.getElementById('game-message-area');
    if (msgGame) msgGame.style.display = 'none';
    canPlay = true;
    const actionBtn = document.getElementById('draw-action-btn');
    if (actionBtn) actionBtn.disabled = false;
  }

  function resetToBetMenu() {
    // volver a pantalla de apuestas
    document.getElementById('game-play-panel').style.display = 'none';
    document.getElementById('bet-selection-panel').style.display = 'block';
    const betMsg = document.getElementById('bet-message-area');
    if (betMsg) betMsg.style.display = 'none';
    // actualizar saldo mostrado por si hubo cambios
    if (currentUser) {
      document.getElementById('saldo-display').textContent = `$${currentUser.dinero.toFixed(2)}`;
      document.getElementById('money-display').textContent = `$${currentUser.dinero.toFixed(2)}`;
    }
  }

  function goToCasinoHome() {
    window.location.href = '../app.html';
  }

  // -------- EVENTOS Y INICIALIZACION ----------
  async function init() {
    await autoLoginAndLoadUser();
    if (currentUser) {
      document.getElementById('money-display').textContent = `$${currentUser.dinero.toFixed(2)}`;
      document.getElementById('saldo-display').textContent = `$${currentUser.dinero.toFixed(2)}`;
    }
    // Botones de apuesta
    document.querySelectorAll('.bet-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const betVal = parseFloat(btn.getAttribute('data-bet'));
        if (!isNaN(betVal)) setBet(betVal);
      });
    });
    const applyCustom = document.getElementById('apply-custom-btn');
    if (applyCustom) applyCustom.addEventListener('click', () => setCustomBet());
    
    const startBtn = document.getElementById('start-game-btn');
    if (startBtn) startBtn.addEventListener('click', startGameHandler);
    
    const drawAction = document.getElementById('draw-action-btn');
    if (drawAction) drawAction.addEventListener('click', () => executeLuckyDraw());
    
    // También el cofre puede ser clickeable (alternativa)
    const chestContainer = document.getElementById('mystery-chest');
    if (chestContainer) {
      chestContainer.addEventListener('click', () => {
        if (document.getElementById('game-play-panel').style.display === 'block') {
          executeLuckyDraw();
        }
      });
    }
    
    const changeBetBtn = document.getElementById('change-bet-btn');
    if (changeBetBtn) changeBetBtn.addEventListener('click', resetToBetMenu);
    
    const casinoHome = document.getElementById('casino-home-btn');
    if (casinoHome) casinoHome.addEventListener('click', goToCasinoHome);
    
    // Asegurar estados iniciales
    document.getElementById('bet-selection-panel').style.display = 'block';
    document.getElementById('game-play-panel').style.display = 'none';
  }

  init();
</script>
</body>
</html>
