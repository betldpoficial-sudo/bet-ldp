<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mayor o Menor - Bet LDP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" type="image/png" href="../assets/logo3.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/mayor-menor.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<nav id="navbar">
  <div id="navbar-left">
    <button id="logo-btn" onclick="window.location.href='../app.html'">
      <img src="../assets/logo1.png" alt="BetLDP Logo">
    </button>
  </div>
  <div id="navbar-right">
    <span id="money-display">$0.00</span>
  </div>
</nav>

<div class="game-master">
  <div class="game-container">
    <h1>🎲 MAYOR o MENOR 🎲</h1>

    <div id="mm-selection" class="card">
      <div class="saldo-header">
        <div style="font-size: 13px; letter-spacing: 1px; opacity:0.8;">💎 SALDO DISPONIBLE</div>
        <div style="font-size: 34px; font-weight: bold; color: #fcd15a;" id="saldo-display">$0.00</div>
      </div>
      <label>🎯 TU APUESTA ($)</label>
      <div class="bet-options">
        <button class="bet-btn" onclick="setQuickBet(10)">$10</button>
        <button class="bet-btn" onclick="setQuickBet(25)">$25</button>
        <button class="bet-btn" onclick="setQuickBet(50)">$50</button>
        <button class="bet-btn" onclick="setQuickBet(100)">$100</button>
      </div>
      <input type="number" id="mm-bet" placeholder="Ej: 75" min="1" step="1">
      <button class="btn-primary" onclick="mmStartGame()" style="margin-top: 20px; width: 100%;">🎲 INICIAR PARTIDA 🃏</button>
      <div id="mm-msg-selection" class="alert" style="display:none;"></div>
    </div>

    <div id="mm-game-area" style="display:none;">
      <div class="card">
        <div style="text-align:center;">
          <div style="font-size: 13px; text-transform: uppercase; opacity:0.7;">🏆 apuesta actual acumulada</div>
          <div style="font-size: 34px; font-weight: bold; color: #f5cd7a;">$<span id="mm-bet-display">0</span></div>
        </div>
      </div>
      <div class="card">
        <div id="mm-current-number" class="mm-number">5</div>
        <div class="flex-row">
          <button class="btn-primary" onclick="mmGuess('mayor')" style="flex:1;">🔺 MAYOR</button>
          <button class="btn-primary" onclick="mmGuess('menor')" style="flex:1;">🔻 MENOR</button>
        </div>
        <div id="mm-result" style="font-size: 16px; text-align: center; min-height: 60px; padding: 8px;"></div>
        <button class="btn-secondary" style="margin-top: 8px; width: 100%;" onclick="mmEndGame()">💵 RETIRARSE CON GANANCIAS</button>
      </div>
    </div>

    <div id="mm-result-final" class="card" style="display:none; text-align:center;">
      <h2 id="mm-final-title" style="color:#f7d474;">🏁 RESULTADO</h2>
      <div id="mm-final-detail" style="margin: 22px 0; font-size: 1.1rem;"></div>
      <button class="btn-primary" onclick="resetToMenu()">🔄 JUGAR DE NUEVO</button>
      <button class="btn-secondary" style="margin-top: 12px;" onclick="window.location.href='../app.html'">🏠 VOLVER AL CASINO</button>
    </div>
  </div>
</div>

<script>
  // ===================== FIREBASE CONFIG (oficial) =====================
  const firebaseConfig = {
    apiKey: "AIzaSyC8jSaP8e1UvLDn2sDdIyo2Z9o_KNhSEro",
    authDomain: "tuesa-oficial.firebaseapp.com",
    projectId: "tuesa-oficial",
    storageBucket: "tuesa-oficial.firebasestorage.app",
    messagingSenderId: "447951557213",
    appId: "1:447951557213:web:293e062ae3fe474c1cb3b4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let currentUser = null;
  let mmState = {
    active: false,
    bet: 0,
    currentNumber: 5,
    gameOver: false
  };

  // ---------- Helper UI (mensajes) ----------
  function showMsg(containerId, type, text) {
    const el = document.getElementById(containerId);
    if (el) {
      el.className = 'alert ' + type;
      el.textContent = text;
      el.style.display = 'block';
      setTimeout(() => { if (el) el.style.display = 'none'; }, 4000);
    }
  }

  // Actualiza el navbar y el saldo en pantalla principal
  async function updateGlobalMoneyDisplay(newAmount) {
    if (!currentUser) return;
    currentUser.dinero = newAmount;
    const moneySpan = document.getElementById('money-display');
    if (moneySpan) moneySpan.textContent = `$${newAmount.toFixed(2)}`;
    const saldoSpan = document.getElementById('saldo-display');
    if (saldoSpan) saldoSpan.textContent = `$${newAmount.toFixed(2)}`;
  }

  async function syncUserToFirestore() {
    if (!currentUser) return;
    await db.collection('cuentas').doc(currentUser.docId).update({ dinero: currentUser.dinero });
  }

  // Auto-login con localStorage + compatibilidad con otros juegos
  async function autoLoginAndLoadUser() {
    let userId = localStorage.getItem('betldp_user_id');
    if (userId) {
      const doc = await db.collection('cuentas').doc(userId).get();
      if (doc.exists) {
        currentUser = { docId: doc.id, ...doc.data() };
        await updateGlobalMoneyDisplay(currentUser.dinero);
        return true;
      }
    }
    // Demo user específico para "Mayor o Menor"
    const testSnap = await db.collection('cuentas').where('correo', '==', 'mayor_menor@demo.com').get();
    if (!testSnap.empty) {
      currentUser = { docId: testSnap.docs[0].id, ...testSnap.docs[0].data() };
    } else {
      const newUser = { user: "HighRoller", correo: "mayor_menor@demo.com", clave: "demo123", dinero: 1250 };
      const docRef = await db.collection('cuentas').add(newUser);
      currentUser = { docId: docRef.id, ...newUser };
    }
    localStorage.setItem('betldp_user_id', currentUser.docId);
    await updateGlobalMoneyDisplay(currentUser.dinero);
    return true;
  }

  // Modifica el dinero (resta o suma directamente)
  async function modifyUserBalance(amount, isAdding) {
    if (!currentUser) return false;
    let newMoney = currentUser.dinero;
    if (isAdding) newMoney += amount;
    else newMoney -= amount;
    if (newMoney < 0) return false;
    currentUser.dinero = newMoney;
    await updateGlobalMoneyDisplay(newMoney);
    await syncUserToFirestore();
    return true;
  }

  // Botones rápidos de apuesta
  function setQuickBet(amount) {
    document.getElementById('mm-bet').value = amount;
  }

  // Iniciar partida -> descuenta apuesta inicial, configura juego
  async function mmStartGame() {
    if (!currentUser) {
      showMsg('mm-msg-selection', 'error', '⛔ No se pudo cargar tu sesión. Recarga la página o inicia sesión.');
      return;
    }
    const betInput = parseFloat(document.getElementById('mm-bet').value);
    if (isNaN(betInput) || betInput < 1) {
      showMsg('mm-msg-selection', 'error', '⚠️ Apuesta inválida (mínimo $1).');
      return;
    }
    if (betInput > currentUser.dinero) {
      showMsg('mm-msg-selection', 'error', `❌ Saldo insuficiente. Tienes $${currentUser.dinero.toFixed(2)}`);
      return;
    }

    // Restar la apuesta inicial (riesgo)
    const success = await modifyUserBalance(betInput, false);
    if (!success) {
      showMsg('mm-msg-selection', 'error', 'Error al procesar la apuesta. Intenta de nuevo.');
      return;
    }

    mmState.bet = betInput;
    mmState.currentNumber = Math.floor(Math.random() * 10) + 1; // 1-10
    mmState.active = true;
    mmState.gameOver = false;

    // UI cambio
    document.getElementById('mm-selection').style.display = 'none';
    document.getElementById('mm-game-area').style.display = 'block';
    document.getElementById('mm-result-final').style.display = 'none';
    document.getElementById('mm-bet-display').innerText = mmState.bet.toFixed(2);
    document.getElementById('mm-current-number').innerText = mmState.currentNumber;
    document.getElementById('mm-result').innerHTML = '';
  }

  // Lógica principal de adivinar: generar nuevo número aleatorio (diferente al actual)
  async function mmGuess(choice) {
    if (!mmState.active || mmState.gameOver) return;

    let newNumber;
    do {
      newNumber = Math.floor(Math.random() * 10) + 1;
    } while (newNumber === mmState.currentNumber);

    // Animación de cambio de número
    const numberDisplay = document.getElementById('mm-current-number');
    numberDisplay.style.transform = 'scale(1.2)';
    setTimeout(() => {
      numberDisplay.innerText = newNumber;
      numberDisplay.style.transform = 'scale(1)';
    }, 130);

    let won = false;
    if (choice === 'mayor' && newNumber > mmState.currentNumber) won = true;
    if (choice === 'menor' && newNumber < mmState.currentNumber) won = true;

    // Actualizar estado
    mmState.currentNumber = newNumber;

    if (won) {
      // ¡Acierto! La apuesta acumulada se duplica
      const newBetAmount = mmState.bet * 2;
      mmState.bet = newBetAmount;
      document.getElementById('mm-bet-display').innerText = mmState.bet.toFixed(2);
      document.getElementById('mm-result').innerHTML = `<span style="color:#6feb8e;">✅ ¡ACERTASTE! Sigue jugando. Apuesta acumulada: $${mmState.bet.toFixed(2)}</span>`;
    } else {
      // Pierde -> Game Over, sin devolución (ya se descontó el riesgo inicial)
      mmState.gameOver = true;
      mmState.active = false;
      document.getElementById('mm-result').innerHTML = `<span style="color:#ff8a7a;">❌ ¡FALLISTE! El nuevo número era ${newNumber}. Perdiste la apuesta acumulada.</span>`;
      await mmShowFinalResult(false);
    }
  }

  // Pantalla de resultado final (derrota)
  async function mmShowFinalResult(won) {
    if (!mmState.active && mmState.gameOver === true) {
      // en caso de derrota ya se perdió el dinero (no se suma nada)
      document.getElementById('mm-game-area').style.display = 'none';
      document.getElementById('mm-result-final').style.display = 'block';
      document.getElementById('mm-final-title').innerHTML = '💀 DERROTA 💀';
      document.getElementById('mm-final-detail').innerHTML = `
        <div style="font-size: 1.2rem;">❌ Has perdido tu acumulación total.</div>
        <div style="margin-top: 12px;">💰 Saldo actual: $${currentUser?.dinero?.toFixed(2) ?? 0}</div>
        <div style="margin-top: 6px;">La racha se rompió...</div>
      `;
    }
  }

  // Retirarse con ganancias: abona el monto acumulado al saldo
  async function mmEndGame() {
    if (!mmState.active) return;
    const totalWin = mmState.bet; // apuesta acumulada actual
    if (totalWin <= 0) {
      // caso borde (si es 0 no hay ganancia)
      mmState.active = false;
      mmState.gameOver = true;
      document.getElementById('mm-game-area').style.display = 'none';
      document.getElementById('mm-result-final').style.display = 'block';
      document.getElementById('mm-final-title').innerHTML = '🏁 RETIRADA ANTICIPADA';
      document.getElementById('mm-final-detail').innerHTML = `No acumulaste ganancias. Saldo: $${currentUser.dinero.toFixed(2)}`;
      return;
    }
    // Sumar las ganancias al usuario
    await modifyUserBalance(totalWin, true);
    mmState.active = false;
    mmState.gameOver = true;
    document.getElementById('mm-game-area').style.display = 'none';
    document.getElementById('mm-result-final').style.display = 'block';
    document.getElementById('mm-final-title').innerHTML = '🎉 ¡TE RETIRASTE CON GANANCIAS! 🎉';
    document.getElementById('mm-final-detail').innerHTML = `
      <div style="font-size: 1.3rem; margin:12px 0;">💵 GANANCIA NETA: $${totalWin.toFixed(2)}</div>
      <div>💰 Nuevo saldo: $${currentUser.dinero.toFixed(2)}</div>
      <div style="margin-top:8px;">✨ ¡Excelente decisión!</div>
    `;
  }

  // resetear a la pantalla de selección (jugar de nuevo sin recargar)
  function resetToMenu() {
    document.getElementById('mm-result-final').style.display = 'none';
    document.getElementById('mm-game-area').style.display = 'none';
    document.getElementById('mm-selection').style.display = 'block';
    document.getElementById('mm-bet').value = '';
    const msgDiv = document.getElementById('mm-msg-selection');
    if (msgDiv) msgDiv.style.display = 'none';
    mmState.active = false;
    mmState.gameOver = false;
  }

  // Inicialización global
  async function init() {
    await autoLoginAndLoadUser();
    if (currentUser) {
      const moneySpan = document.getElementById('money-display');
      if (moneySpan) moneySpan.textContent = `$${currentUser.dinero.toFixed(2)}`;
      const saldoSpan = document.getElementById('saldo-display');
      if (saldoSpan) saldoSpan.textContent = `$${currentUser.dinero.toFixed(2)}`;
    }
  }

  init();
</script>
</body>
</html>
